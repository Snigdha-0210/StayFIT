            height: 12px;

            50% { height: 20px; }

            display: none;

<script>
        // Micro-interaction logic
        const voiceTrigger = document.getElementById('voice-trigger');
        const micStatic = document.getElementById('mic-static');
        const micActive = document.getElementById('mic-active');
        const typingIndicator = document.getElementById('typing-indicator');

        let isListening = false;

        voiceTrigger.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                micStatic.classList.add('hidden');
                micActive.classList.remove('hidden');
                voiceTrigger.classList.add('bg-primary/30', 'scale-110');
            } else {
                micStatic.classList.remove('hidden');
                micActive.classList.add('hidden');
                voiceTrigger.classList.remove('bg-primary/30', 'scale-110');
                
                // Simulate thinking
                typingIndicator.classList.remove('opacity-0');
                setTimeout(() => {
                    typingIndicator.classList.add('opacity-0');
                }, 2000);
            }
        });

        // Smooth Scroll to bottom
        const scrollToBottom = () => {
            const chatContainer = document.querySelector('main > div');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };
        window.onload = scrollToBottom;
    </script>
